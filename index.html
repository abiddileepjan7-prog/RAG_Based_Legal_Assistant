<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI RAG Assistant</title>

<style>



/* =========================
   WELCOME SCREEN
========================= */

#welcome{

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

height:70vh;

text-align:center;

opacity:0.85;

}

#welcome h1{

font-size:40px;
margin-bottom:10px;

background:linear-gradient(90deg,#38bdf8,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

#welcome p{

color:var(--muted);
font-size:16px;

}
/* =========================
   LIQUID GLASS COLOR SYSTEM
========================= */

:root{

--accent:#38bdf8;
--accent2:#8b5cf6;

--glass:rgba(255,255,255,0.06);
--glass-strong:rgba(255,255,255,0.12);

--border:rgba(255,255,255,0.18);

--text:#e5e7eb;
--muted:#94a3b8;

--glow:rgba(56,189,248,0.45);

}


/* =========================
   BODY / LIQUID BACKGROUND
========================= */

body{

margin:0;
font-family:"Segoe UI",system-ui;

color:var(--text);

display:flex;
height:100dvh;
overflow:hidden;

background:

radial-gradient(circle at 20% 20%, #1e293b, transparent 40%),
radial-gradient(circle at 80% 30%, #312e81, transparent 40%),
radial-gradient(circle at 40% 80%, #0ea5e9, transparent 40%),
#020617;

}


/* =========================
   SCROLLBAR
========================= */

::-webkit-scrollbar{
width:8px;
}

::-webkit-scrollbar-thumb{
background:#334155;
border-radius:6px;
}

*{
scrollbar-width:thin;
scrollbar-color:#334155 transparent;
}


/* =========================
   SIDEBAR
========================= */

#sidebar{

width:270px;
padding:20px;
margin:12px;
border-radius:26px;

background:var(--glass);

backdrop-filter:blur(40px) saturate(150%);
-webkit-backdrop-filter:blur(40px) saturate(150%);

border:1px solid var(--border);

box-shadow:
0 20px 70px rgba(0,0,0,0.6),
inset 0 1px 0 rgba(255,255,255,0.08);

overflow-y:auto;
transition:.35s;

}

#chatSessions{
margin-top:10px;
overflow-y:auto;
max-height:80vh;
}


/* =========================
   SIDEBAR HEADER
========================= */

#sidebarHeader{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;

font-weight:600;

}


/* =========================
   SIDEBAR BUTTONS
========================= */

.sidebar-btn{

padding:12px;
margin:12px 0;
border-radius:16px;

cursor:pointer;
text-align:center;

background:var(--glass);

backdrop-filter:blur(20px);

border:1px solid var(--border);

transition:.25s;

}

.sidebar-btn:hover{

transform:translateY(-2px);

background:rgba(255,255,255,0.12);

}


/* =========================
   CHAT SESSION ITEMS
========================= */

.chat-session{

padding:10px;
margin:6px 0;
border-radius:14px;

cursor:pointer;
font-size:13px;

background:var(--glass);

border:1px solid var(--border);

transition:.2s;

}

.chat-session:hover{

transform:translateY(-2px);

background:rgba(255,255,255,0.1);

}

.chat-session.active{

background:linear-gradient(
135deg,
var(--accent),
var(--accent2)
);

color:white;

}


/* =========================
   UPLOAD CARD
========================= */

.upload-card{

margin-top:15px;
padding:18px;

border-radius:18px;
text-align:center;
cursor:pointer;

background:var(--glass);

border:1px solid var(--border);

backdrop-filter:blur(20px);

transition:.25s;

}

.upload-card:hover{

transform:scale(1.03);

}


/* =========================
   MAIN PANEL
========================= */

#main{

flex:1;
display:flex;
flex-direction:column;

margin:12px;
border-radius:28px;

background:rgba(255,255,255,0.03);

backdrop-filter:blur(30px);

border:1px solid var(--border);

box-shadow:
0 30px 80px rgba(0,0,0,0.7);

}


/* =========================
   TOPBAR
========================= */

#topbar{

height:70px;

display:flex;
align-items:center;
justify-content:center;

background:var(--glass);

backdrop-filter:blur(25px);

border-bottom:1px solid var(--border);

font-weight:600;

}


/* =========================
   CHAT CONTAINER
========================= */

#chat-container{

flex:1;
overflow-y:auto;

padding:24px;

}


/* =========================
   MESSAGE WRAPPER
========================= */

.message{

display:flex;
margin:12px 0;

animation:messageIn .25s ease;

}

@keyframes messageIn{

from{
opacity:0;
transform:translateY(8px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.user{
justify-content:flex-end;
}

.bot{
justify-content:flex-start;
}


/* =========================
   CHAT BUBBLES
========================= */

.message .bubble{

max-width:70%;

padding:14px 18px;
border-radius:20px;

background:var(--glass);

backdrop-filter:blur(20px);

border:1px solid var(--border);

box-shadow:
0 10px 30px rgba(0,0,0,0.4),
inset 0 1px 0 rgba(255,255,255,0.05);

}


/* USER BUBBLE */

.user .bubble{

background:linear-gradient(
135deg,
var(--accent),
var(--accent2)
);

border:none;

box-shadow:
0 10px 30px rgba(56,189,248,0.4);

}


/* =========================
   INPUT AREA
========================= */

#input-area{

padding:18px;

}


/* =========================
   INPUT BOX
========================= */

#input-box{

display:flex;
align-items:flex-end;

border-radius:30px;

padding:14px;
gap:10px;

max-width:900px;
margin:auto;

background:var(--glass);

backdrop-filter:blur(30px);

border:1px solid var(--border);

box-shadow:
0 20px 60px rgba(0,0,0,0.5);

}


/* =========================
   TEXTAREA
========================= */

#message{

flex:1;
background:transparent;
border:none;

color:var(--text);

font-size:15px;
outline:none;

resize:none;
overflow-y:auto;

max-height:160px;

}


/* =========================
   SEND BUTTON
========================= */

#sendBtn{

border:none;
color:white;

padding:10px 18px;

border-radius:16px;

cursor:pointer;
font-weight:600;

background:linear-gradient(
135deg,
var(--accent),
var(--accent2)
);

box-shadow:
0 8px 30px var(--glow);

transition:.2s;

}

#sendBtn:hover{

transform:translateY(-2px);

box-shadow:
0 12px 40px var(--glow);

}


/* =========================
   THINKING DOTS
========================= */

.typing{

display:inline-flex;
gap:4px;

}

.typing span{

width:6px;
height:6px;

background:#94a3b8;

border-radius:50%;

animation:blink 1.4s infinite;

}

.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}

@keyframes blink{

0%{opacity:.2}
20%{opacity:1}
100%{opacity:.2}

}


/* =========================
   FILE LIST
========================= */

.file-item{

display:flex;
justify-content:space-between;

padding:8px;

margin:6px 0;

border-radius:12px;

background:var(--glass);

border:1px solid var(--border);

}
</style>

</head>

<body>

<div id="overlay" onclick="closeSidebar()"></div>

<div id="sidebar">

<div class="sidebar-btn" onclick="createNewChat()">➕ New Chat</div>

<div id="chatSessions"></div>

</div>

</div>

<div id="main">

<div id="topbar">

    <span id="menuBtn" onclick="toggleMenu()"></span>

    <div id="title">⚖️ Legal Assistant</div>

</div>



<div id="chat-container">

<div id="welcome">

<h1>⚖️ Legal Assistant</h1>

<p>Ask questions for legal advices</p>

</div>

</div>

<div id="input-area">
    <div id="input-box">
        <textarea id="message" rows="1"></textarea>
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
</div>

</div>

<script>

/* Sidebar */

const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

function toggleMenu() {

    sidebar.classList.toggle("show");

    if (sidebar.classList.contains("show")) {
        overlay.style.display = "block";
    } else {
        overlay.style.display = "none";
    }
}

function closeSidebar() {
    sidebar.classList.remove("show");
    overlay.style.display = "none";
}


/* STATE */

let chats = {};
let currentChatId = null;
let controller = null;
let isGenerating = false;

const chatContainer = document.getElementById("chat-container");
const fileInput = document.getElementById("fileInput");
const sendBtn = document.getElementById("sendBtn");
const inputBox = document.getElementById("message");

/* Thinking dots */

function thinkingDots() {
    return `<div class="typing"><span></span><span></span><span></span></div>`;
}

/* Chat sessions */

function createNewChat() {

    const id = "chat_" + Date.now();   // internal id (hidden from user)

    chats[id] = {
        id: id,
        title: "New Chat",
        messages: [],
        createdAt: new Date()
    };

    currentChatId = id;

    renderChatSessions();
    renderMessages();

    // ⭐ Close sidebar automatically on mobile
    closeSidebar();
}


function renderChatSessions() {

    const container = document.getElementById("chatSessions");
    container.innerHTML = "";

    Object.keys(chats).forEach(id => {

        const chat = chats[id];

        const div = document.createElement("div");
        div.className = "chat-session " + (id === currentChatId ? "active" : "");
        div.innerText = chat.title;

        div.onclick = () => {
            currentChatId = id;
            renderChatSessions();
            renderMessages();
        };

        container.appendChild(div);
    });
}

function renderMessages() {

    chatContainer.innerHTML = "";

    if (!currentChatId) return;

    chats[currentChatId].messages.forEach(m => {
        addMessage(m.text, m.role, false);
    });
}


/* Messages */

function addMessage(text, role, save = true) {

    const wrapper = document.createElement("div");
    wrapper.className = "message " + role;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = text;

    wrapper.appendChild(bubble);

    chatContainer.appendChild(wrapper);
    chatContainer.scrollTop = chatContainer.scrollHeight;

    if (save && currentChatId) {
        chats[currentChatId].messages.push({text, role});
    }

    return bubble;
}


/* Send message */

async function sendMessage() {

    if (!currentChatId) createNewChat();

    if (isGenerating && controller) {
        controller.abort();
        finishGeneration();
        return;
    }

    const message = inputBox.value.trim();
    if (!message) return;

    const chat = chats[currentChatId];

    // Set chat title from first message
    if (chat.title === "New Chat") {
        chat.title = message.slice(0, 30);
        renderChatSessions();
    }


    addMessage(message, "user");   // save user msg

/* hide welcome screen */

const welcome = document.getElementById("welcome");
if (welcome) {
    welcome.style.display = "none";
}
    inputBox.value = "";
    inputBox.style.height = "auto";

    inputBox.disabled = true;
    isGenerating = true;
    sendBtn.innerText = "Stop";

    // thinking bubble (not saved)
    const botBubble = addMessage(thinkingDots(), "bot", false);

    controller = new AbortController();

    let fullResponse = "";

    try {

        const response = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message}),
            signal: controller.signal
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        let started = false;

        while (true) {

            const {done, value} = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value);

            if (!started) {
                botBubble.innerHTML = "";
                started = true;
            }

            fullResponse += chunk;
            botBubble.innerHTML += chunk;

            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

    } catch {
        botBubble.innerHTML += "<br><i>Stopped</i>";
    }

    // ⭐ SAVE BOT MESSAGE AFTER STREAM ENDS
    if (currentChatId) {
        chats[currentChatId].messages.push({
            text: fullResponse,
            role: "bot"
        });
    }

    finishGeneration();
}


function finishGeneration() {
    inputBox.disabled = false;
    sendBtn.innerText = "Send";
    isGenerating = false;
}

/* Upload */

function openFilePicker() {
    fileInput.click();
}

fileInput.addEventListener("change", () => {

    const selectedDiv = document.getElementById("selectedFiles");

    if (fileInput.files.length === 0) {
        selectedDiv.innerHTML = "";
        return;
    }

    let names = [];

    for (let f of fileInput.files) {
        names.push("📄 " + f.name);
    }

    selectedDiv.innerHTML = names.join("<br>");
});

async function uploadFiles() {

    const files = fileInput.files;
    if (!files.length) return;

    const uploadBtn = document.getElementById("uploadBtn");

    uploadBtn.innerText = "Uploading...";
    uploadBtn.style.opacity = "0.6";

    const formData = new FormData();
    for (let f of files) formData.append("files", f);

    const progress = document.getElementById("progress");
    const bar = document.getElementById("progress-bar");

    progress.style.display = "block";
    bar.style.width = "40%";

    await fetch("/upload", { method: "POST", body: formData });

    bar.style.width = "100%";

    setTimeout(() => {
        progress.style.display = "none";
        bar.style.width = "0%";
    }, 500);

    uploadBtn.innerText = "✅ Uploaded";

    setTimeout(() => {
        uploadBtn.innerText = "Upload";
        uploadBtn.style.opacity = "1";
    }, 1500);

    fileInput.value = "";
    document.getElementById("selectedFiles").innerHTML = "";

    loadFiles();
}

/* Files */

async function toggleFiles() {

    const fileList = document.getElementById("fileList");

    if (fileList.style.display === "none") {
        await loadFiles();
        fileList.style.display = "block";
    } else {
        fileList.style.display = "none";
    }
}

async function loadFiles() {

    const fileList = document.getElementById("fileList");

    const response = await fetch("/files");
    const data = await response.json();

    fileList.innerHTML = "";

    data.files.forEach(file => {

        const div = document.createElement("div");
        div.className = "file-item";

        div.innerHTML = `
            <span>${file}</span>
            <button onclick="deleteFile('${file}')">X</button>
        `;

        fileList.appendChild(div);
    });
}

async function deleteFile(filename) {

    await fetch("/delete", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({filename})
    });

    loadFiles();
}

/* Enter */

inputBox.addEventListener("keydown", function(e){

if(e.key === "Enter" && !e.shiftKey){

e.preventDefault()

if(inputBox.value.trim().length > 0){
sendMessage()
}

}

})
/* Auto grow textarea */

inputBox.addEventListener("input", () => {

    inputBox.style.height = "auto";
    inputBox.style.height = inputBox.scrollHeight + "px";

});

/* Init */

createNewChat();

</script>

</body>
</html>
